[project]
name = "rfnry-knowledge"
version = "0.1.0"
description = "rfnry/knowledge - retrieval-augmented generation engine (provider-agnostic)"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [
    {name = "rfnry", email = "contact@rfnry.dev"},
]

dependencies = [
    "qdrant-client>=1.17.1",
    "sqlalchemy[asyncio]>=2.0.49",
    "asyncpg>=0.31.0",
    "aiosqlite>=0.22.1",
    "pymupdf>=1.27.2.2,<2.0",
    "rank-bm25>=0.2.2,<1.0",
    "pydantic>=2.12.5",
    "scikit-learn>=1.8.0",
    "baml-py==0.221.0",
    "lxml>=6.1.0,<7.0",
    "ezdxf>=1.3,<2.0",
    "matplotlib>=3.8,<4.0",
]

[project.urls]
Repository = "https://github.com/rfnry/knowledge"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.11",
    "poethepoet>=0.44.0",
    "mypy>=1.20.1",
]
graph = [
    "neo4j>=6.1.0,<7.0",
]

[tool.mypy]
python_version = "3.12"
mypy_path = "src"
exclude = ["src/rfnry_knowledge/baml/baml_client"]
ignore_missing_imports = true

[tool.ruff]
line-length = 120
target-version = "py312"
exclude = ["src/rfnry_knowledge/baml/baml_client"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF022"]

[tool.ruff.lint.per-file-ignores]
"src/rfnry_knowledge/__init__.py" = ["E402", "F401", "F403", "F811"]
"src/rfnry_knowledge/retrieval/__init__.py" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["src", "tests"]
testpaths = ["tests"]
addopts = "--import-mode=importlib"

[tool.poe.tasks]
format = "ruff format ."
check = "ruff check ."
"check:fix" = "ruff check . --fix"
typecheck = "mypy src/"
test = "pytest"
"test:cov" = "pytest --cov=rfnry_knowledge --cov-report=term-missing"
"baml:generate" = "baml-cli generate --from src/rfnry_knowledge/baml/baml_src"
"baml:test" = "baml test --from src/rfnry_knowledge/baml/baml_src"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rfnry_knowledge"]

[tool.hatch.build]
exclude = ["**/test_*.py", "**/__pycache__", "**/*.pyc"]
