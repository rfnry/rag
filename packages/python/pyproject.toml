[project]
name = "rfnry-rag"
version = "0.1.0"
description = "rfnry/rag - retrieval-augmented generation"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [
    {name = "rfnry", email = "contact@rfnry.dev"},
]

dependencies = [
    "openai>=2.32.0",
    "anthropic>=0.96.0",
    "qdrant-client>=1.17.1",
    "sqlalchemy[asyncio]>=2.0.49",
    "asyncpg>=0.31.0",
    "aiosqlite>=0.22.1",
    "pymupdf>=1.27.2.2",
    "rank-bm25>=0.2.2",
    "pydantic>=2.12.5",
    "scikit-learn>=1.8.0",
    "voyageai>=0.3.7",
    "cohere>=6.1.0",
    "baml-py==0.221.0",
    "lxml>=6.1.0",
    "fastembed>=0.8.0",
]

[project.urls]
Repository = "https://github.com/rfnry/rag"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.11",
    "poethepoet>=0.44.0",
    "mypy>=1.20.1",
]
graph = [
    "neo4j>=6.1.0",
]
cli = [
    "click>=8.3.2",
]

[project.scripts]
rfnry-rag = "rfnry_rag.cli:main"
rfnry-rag-retrieval = "rfnry_rag.retrieval.cli:main"
rfnry-rag-reasoning = "rfnry_rag.reasoning.cli:main"

[tool.mypy]
python_version = "3.12"
mypy_path = "src"
exclude = ["src/rfnry_rag/retrieval/baml/baml_client", "src/rfnry_rag/reasoning/baml/baml_client"]
ignore_missing_imports = true

[tool.ruff]
line-length = 120
target-version = "py312"
exclude = ["src/rfnry_rag/retrieval/baml/baml_client", "src/rfnry_rag/reasoning/baml/baml_client"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
"src/rfnry_rag/__init__.py" = ["E402", "F401", "F403", "F811"]
"src/rfnry_rag/cli.py" = ["F401"]
"src/rfnry_rag/retrieval/__init__.py" = ["E402"]
"src/rfnry_rag/retrieval/cli/__init__.py" = ["F401"]
"src/rfnry_rag/reasoning/__init__.py" = ["E402"]
"src/rfnry_rag/reasoning/cli/__init__.py" = ["F401"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["src"]

[tool.poe.tasks]
format = "ruff format ."
check = "ruff check ."
"check:fix" = "ruff check . --fix"
typecheck = "mypy src/"
test = "pytest"
"test:cov" = "pytest --cov=rfnry_rag --cov-report=term-missing"
"baml:generate:retrieval" = "baml-cli generate --from src/rfnry_rag/retrieval/baml/baml_src"
"baml:generate:reasoning" = "baml-cli generate --from src/rfnry_rag/reasoning/baml/baml_src"
"baml:test:retrieval" = "baml test --from src/rfnry_rag/retrieval/baml/baml_src"
"baml:test:reasoning" = "baml test --from src/rfnry_rag/reasoning/baml/baml_src"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rfnry_rag"]

[tool.hatch.build]
exclude = ["**/test_*.py", "**/__pycache__", "**/*.pyc"]
